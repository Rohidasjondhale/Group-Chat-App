<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Chat</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    /* only added this new style */
    #email-search-box {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 8px;
      z-index: 1000;
    }

    #email-search-box input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
    }

    #email-search-box button {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    /* keep your old chat design below */
    #chat-container {
      width: 400px;
      margin: 80px auto 20px auto;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    #chat-box {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      background: #f9f9f9;
    }

    .message {
      margin: 10px 0;
      padding: 8px 12px;
      border-radius: 8px;
      max-width: 70%;
      clear: both;
    }

    .sent {
      background: #dcf8c6;
      margin-left: auto;
      text-align: right;
    }

    .received {
      background: #eee;
      margin-right: auto;
      text-align: left;
    }

    #messageInput {
      width: 75%;
      padding: 10px;
    }

    button.send-btn {
      padding: 10px 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="email-search-box">
    <input type="text" id="searchEmail" placeholder="Enter user email" />
    <button onclick="joinRoom()">Join Chat</button>
  </div>

  <div id="chat-container">
    <div id="chat-box"></div>

    <input type="text" id="messageInput" placeholder="Type a message" />
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script src="http://localhost:3000/socket.io/socket.io.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
